eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:password@localhost:8761/eureka   # было discovery-server
  instance:
    preferIpAddress: true
    ip-address: 127.0.0.1   # опционально, для явного указания IP

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**