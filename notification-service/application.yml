spring:
  kafka:
    bootstrap-servers: localhost:9092
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MY_EMAIL}          # переменная окружения
    password: ${MAIL_PASSWORD}      # переменная окружения
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:password@localhost:8761/eureka
  instance:
    preferIpAddress: true

logging:
  level:
    com.alekseev.notificationservice: DEBUG